apiVersion: apps/v1
kind: Deployment
metadata:
  name: rdp
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: rdp
  template:
    metadata:
      labels:
        app: rdp
    spec:
      containers:
      - name: rdesktop
        image: lscr.io/linuxserver/rdesktop:ubuntu-xfce
        ports:
        - containerPort: 3389
        env:
        - name: PUID
          value: "1000"
        - name: PGID
          value: "1000"
        - name: TZ
          value: "Asia/Seoul"
        readinessProbe:
          tcpSocket:
            port: 3389
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 3389
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: rdp
  namespace: demo
spec:
  type: ClusterIP
  clusterIP: 10.43.0.39
  selector:
    app: rdp
  ports:
  - protocol: TCP
    port: 3389
    targetPort: 3389
