apiVersion: apps/v1
kind: Deployment
metadata:
  name: vnc
  namespace: cloudflare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vnc
  template:
    metadata:
      labels:
        app: vnc
    spec:
      containers:
      - name: vnc
        image: carlonluca/vnc-desktop:jammy-lxqt
        ports:
        - containerPort: 5900
          name: vnc
        env:
        - name: USER
          value: "cloudflare"
        - name: RESOLUTION
          value: "1920x1080"
        readinessProbe:
          tcpSocket:
            port: 5900
          initialDelaySeconds: 15
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5900
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vnc
  namespace: cloudflare
spec:
  type: ClusterIP
  clusterIP: 10.10.22.59
  selector:
    app: vnc
  ports:
  - protocol: TCP
    port: 5900
    targetPort: 5900
    name: vnc
