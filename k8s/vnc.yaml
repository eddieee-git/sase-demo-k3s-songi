apiVersion: apps/v1
kind: Deployment
metadata:
  name: vnc
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vnc
  template:
    metadata:
      labels:
        app: vnc
    spec:
      containers:
      - name: vnc
        image: accetto/ubuntu-vnc-xfce-g3:latest
        ports:
        - containerPort: 5901
          name: vnc
        - containerPort: 6901
          name: novnc
        env:
        - name: VNC_PW
          value: "demo"
        - name: VNC_RESOLUTION
          value: "1920x1080"
        readinessProbe:
          tcpSocket:
            port: 5901
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5901
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vnc
  namespace: demo
spec:
  type: ClusterIP
  clusterIP: 10.43.0.59
  selector:
    app: vnc
  ports:
  - protocol: TCP
    port: 5901
    targetPort: 5901
    name: vnc
  - protocol: TCP
    port: 6901
    targetPort: 6901
    name: novnc
