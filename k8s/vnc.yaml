apiVersion: apps/v1
kind: Deployment
metadata:
  name: vnc
  namespace: demo
spec:
  replicas: 1
  selector:
    matchLabels:
      app: vnc
  template:
    metadata:
      labels:
        app: vnc
    spec:
      containers:
      - name: vnc
        image: dorowu/ubuntu-desktop-lxde-vnc:latest
        ports:
        - containerPort: 5900
          name: vnc
        - containerPort: 6080
          name: novnc
        env:
        - name: VNC_PASSWORD
          value: "demo"
        - name: RESOLUTION
          value: "1920x1080"
        readinessProbe:
          tcpSocket:
            port: 5900
          initialDelaySeconds: 10
          periodSeconds: 10
        livenessProbe:
          tcpSocket:
            port: 5900
          initialDelaySeconds: 30
          periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vnc
  namespace: demo
spec:
  type: ClusterIP
  clusterIP: 10.43.0.59
  selector:
    app: vnc
  ports:
  - protocol: TCP
    port: 5900
    targetPort: 5900
    name: vnc
  - protocol: TCP
    port: 6080
    targetPort: 6080
    name: novnc
